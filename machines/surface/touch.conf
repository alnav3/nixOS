# =============================================================================
# Touch / tablet-mode configuration (surface)
# Sourced from hyprland.conf when the host opts in (via HM hyprland plugins).
# Requires: hyprgrass plugin loaded by home-manager.
# NOTE: Hyprspace (workspace overview) is currently disabled — its source
# targets Hyprland v0.54.2 while hyprgrass requires current Hyprland. The
# two plugins can't load into the same Hyprland binary right now. Revisit
# when Hyprspace catches up.
# =============================================================================

plugin {
    # -------------------------------------------------------------------------
    # hyprgrass: touchscreen gestures
    # -------------------------------------------------------------------------
    touch_gestures {
        sensitivity = 4.0
        workspace_swipe_fingers = 3
        # We use edges manually below, not the built-in edge-to-workspace
        workspace_swipe_edge = none
        long_press_delay = 400
        resize_on_border_long_press = true
        edge_margin = 30

        # --- Three fingers swipe down -> screenshot (same as $mainMod+W) ---
        hyprgrass-bind = , swipe:3:d, exec, hyprshot -m active -m output -o /home/alnav/Pictures/Screenshots

        # --- Edge swipes for workspace navigation ---
        # Swipe IN from right edge (leftward) -> next workspace
        hyprgrass-bind = , edge:r:l, workspace, +1
        # Swipe IN from left edge (rightward) -> previous workspace
        hyprgrass-bind = , edge:l:r, workspace, -1

        # --- Swipe up from bottom edge -> on-screen keyboard toggle ---
        # (swapped with app drawer - keyboard is now on the bottom edge,
        #  which matches mobile/tablet conventions)
        hyprgrass-bind = , edge:d:u, exec, pkill -RTMIN wvkbd-mobintl

        # --- Swipe down from top edge -> app drawer (nwg-drawer) ---
        # (swapped with on-screen keyboard)
        hyprgrass-bind = , edge:u:d, exec, nwg-drawer

        # --- Four-finger tap -> close active window (same as $mainMod+C) ---
        hyprgrass-bind = , tap:4, exec, ~/.config/hypr/scripts/close_app.sh

        # --- Three-finger pinch -> fullscreen on/off (directional) ---
        # Pinch out (o = fingers spreading apart) -> exit fullscreen
        hyprgrass-bind = , pinch:3:o, exec, \
            hyprctl activewindow -j | jq -e '.fullscreen != 0' >/dev/null && hyprctl dispatch fullscreen 0
        # Pinch in  (i = fingers coming together) -> enter fullscreen if not already
        hyprgrass-bind = , pinch:3:i, exec, \
            hyprctl activewindow -j | jq -e '.fullscreen == 0' >/dev/null && hyprctl dispatch fullscreen 0

        # --- Long-press to move / resize floating windows ---
        hyprgrass-bindm = , longpress:2, movewindow
        hyprgrass-bindm = , longpress:3, resizewindow
    }

}

# =============================================================================
# Keybinds: on-screen keyboard + app drawer
# =============================================================================

# Toggle wvkbd on-screen keyboard
bind = $mainMod, K, exec, pkill -RTMIN wvkbd-mobintl

# Pop up nwg-drawer (resident, signalled to show)
bind = $mainMod, A, exec, nwg-drawer

# Launch the OSK + drawer daemons once per session
exec-once = wvkbd-mobintl --hidden -L 250
exec-once = nwg-drawer -r -wm hyprland
